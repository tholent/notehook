components:
  securitySchemes:
    accessToken:
      type: apiKey
      in: header
      name: x-access-token
      description: "JWT (HS256) session token. Public endpoints override with an empty security list."
  parameters:
    equipmentNoHeader:
      name: equipmentNo
      in: header
      required: false
      description: Device serial number; honoured by most endpoints alongside the token.
      schema: { type: string }
  schemas:
    BaseVO:        { $ref: "./components/schemas/common.yaml#/BaseVO" }
    CommonVO:      { $ref: "./components/schemas/common.yaml#/CommonVO" }
    CommonListVO:  { $ref: "./components/schemas/common.yaml#/CommonListVO" }
