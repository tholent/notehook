openapi: 3.0.3
info:
  title: Supernote Private-Cloud Server API
  description: |
    OpenAPI 3.0 description of the `supernote-service` server (the self-hosted
    "Supernote Private Cloud" backend).

    Generated **solely** from the Markdown specification in `specs/` (which was
    itself reverse-engineered from a ClassFinal-protected Spring Boot JAR whose
    method bodies are stripped). Request/response *shapes*, paths, verbs,
    validation and error codes are authoritative; behavioural descriptions are
    inferred. See `specs/README.md` for the full narrative and `specs/error-codes.md`
    for the complete error catalogue.

    Conventions:
    - Almost every response extends `BaseVO { success, errorCode, errorMsg }`.
      Logical failures return **HTTP 200 with `success:false`** (not 4xx/5xx),
      except: invalid token → 401; multipart upload failure → 500
      (`FILE_UPLOAD_FAILED`); download failure → 500 plain text.
    - Auth is the `x-access-token` JWT header (declared as the default security
      scheme). Public entry points override with `security: []`. The object-storage
      transfer endpoints authenticate with an HMAC URL signature, not the JWT.
    - `equipmentNo` (device serial) is an additional header honoured by most
      endpoints; it is declared as a reusable optional header parameter.
  version: "1.0.0"
  contact:
    name: Reverse-engineered spec — see specs/
servers:
  - url: http://localhost:19071
    description: Default self-hosted server (server.port=19071)
  - url: http://{host}:{port}
    description: Configurable self-hosted deployment
    variables:
      host: { default: localhost }
      port: { default: "19071" }

