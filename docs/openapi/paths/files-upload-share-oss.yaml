        description: Share record created (share URL produced downstream).
        content:
          application/json:
            schema: { $ref: "../components/schemas/common.yaml#/BaseVO" }

generateUploadUrl:
  post:
    tags: [Object Storage]
    summary: Mint signed upload URL
    operationId: generateUploadUrl
    security: []
    parameters:
      - { name: filePath, in: query, required: true, schema: { type: string }, description: Logical storage path/key. }
      - { name: fileName, in: query, required: true, schema: { type: string } }
      - { name: fileSize, in: query, required: false, schema: { type: integer, format: int64 }, description: Folded into the signature when present. }
      - { name: ip, in: query, required: false, schema: { type: string }, description: Client IP. }
    responses:
      "200":
        description: Signed upload URL (valid 30 min).
        content:
          application/json:
            schema: { $ref: "../components/schemas/files-core.yaml#/FileUploadApplyLocalVO" }

uploadFile:
  post:
    tags: [Object Storage]
    summary: Upload whole file via signed URL
    operationId: uploadFile
    description: Authenticated by HMAC signature, not JWT. Signature mismatch → E1306.
    security: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [file, signature, timestamp, nonce, path]
            properties:
              file: { type: string, format: binary, description: File bytes. }
              signature: { type: string, description: HMAC signature from the signed URL. }
              timestamp: { type: integer, format: int64, description: Signed timestamp (ms). }
              nonce: { type: string }
              path: { type: string, description: Encrypted target path. }
    responses:
      "200":
        description: Stored innerName + server-computed md5.
        content:
          application/json:
            schema: { $ref: "../components/schemas/files-upload-share-oss.yaml#/UploadFileVO" }
      "500":
        description: Upload failure (FILE_UPLOAD_FAILED).

uploadPart:
  post:
    tags: [Object Storage]
    summary: Upload one chunk via signed URL
    operationId: uploadPart
    description: Authenticated by HMAC signature, not JWT. Signature mismatch → E1306.
    security: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [file, signature, timestamp, nonce, path, partNumber, totalChunks, uploadId]
            properties:
              file: { type: string, format: binary, description: Chunk bytes. }
              signature: { type: string }
              timestamp: { type: integer, format: int64 }
              nonce: { type: string }
              path: { type: string, description: Encrypted target path. }
              partNumber: { type: integer, description: 1-based chunk index. }
              totalChunks: { type: integer }
              uploadId: { type: string, description: Upload session id. }
    responses:
      "200":
        description: Per-chunk status.
        content:
          application/json:
            schema: { $ref: "../components/schemas/files-upload-share-oss.yaml#/FileChunkVO" }
      "500":
        description: Upload failure (FILE_UPLOAD_FAILED).

generateDownloadUrl:
  post:
    tags: [Object Storage]
    summary: Mint signed download URL
    operationId: generateDownloadUrl
    security: []
    parameters:
      - { name: filePath, in: query, required: true, schema: { type: string }, description: Logical storage path/key. }
      - { name: fileName, in: query, required: true, schema: { type: string } }
      - { name: pathId, in: query, required: true, schema: { type: string }, description: Path/object identifier echoed on download. }
      - { name: ip, in: query, required: false, schema: { type: string }, description: Client IP. }
    responses:
      "200":
        description: Signed download descriptor (plain POJO, not an envelope; valid 24 h).
        content:
          application/json:
            schema: { $ref: "../components/schemas/files-upload-share-oss.yaml#/FileDownloadApplyVO" }

downloadFile:
  get:
    tags: [Object Storage]
    summary: Stream file via signed URL (Range-capable)
    operationId: downloadFile
    description: >-
      Authenticated by HMAC signature, not JWT. Streams raw bytes (NOT a JSON
      envelope); supports HTTP Range → 206 Partial Content. Download exceptions
      surface as HTTP 500 plain text.
    security: []
    parameters:
      - { name: path, in: query, required: true, schema: { type: string }, description: Encrypted file path. }
      - { name: signature, in: query, required: true, schema: { type: string }, description: HMAC download signature. }
      - { name: timestamp, in: query, required: true, schema: { type: integer, format: int64 }, description: Signed timestamp (ms). }
      - { name: nonce, in: query, required: true, schema: { type: string } }
      - { name: pathId, in: query, required: true, schema: { type: string }, description: Path/object identifier. }
      - { name: Range, in: header, required: false, schema: { type: string }, description: Optional byte range for partial content. }
    responses:
      "200":
        description: Full file stream.
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      "206":
        description: Partial content (Range request).
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      "500":
        description: Download failure (plain text).
