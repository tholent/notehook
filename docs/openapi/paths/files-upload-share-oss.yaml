        description: Path + ancestor id chain.
        content:
          application/json:
            schema: { $ref: "../components/schemas/files-upload-share-oss.yaml#/FilePathQueryVO" }

uploadApply:
  post:
    tags: [File - Upload/Share/OSS]
    summary: Web/app upload apply (phase 1)
    operationId: uploadApply
    description: "@ResubmitCheck on fileName+directoryId."
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../components/schemas/files-upload-share-oss.yaml#/FileUploadApplyDTO" }
    responses:
      "200":
        description: Signed upload target (or dedup signal E0310).
        content:
          application/json:
            schema: { $ref: "../components/schemas/files-core.yaml#/FileUploadApplyLocalVO" }

uploadFinish:
  post:
    tags: [File - Upload/Share/OSS]
    summary: Web/app upload finish/commit (phase 3)
    operationId: uploadFinish
    description: "@ResubmitCheck guarded."
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../components/schemas/files-upload-share-oss.yaml#/FileUploadFinishDTO" }
    responses:
