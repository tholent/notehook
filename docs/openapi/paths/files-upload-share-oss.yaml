# File Upload, Sharing & Object Storage paths. Derived from specs/files-upload-share-oss.md.

ftpUpload:
  put:
    tags: [File - Upload/Share/OSS]
    summary: Legacy FTP multipart file upload
    operationId: ftpUpload
    security: []
    parameters:
      - name: innerName
        in: path
        required: true
        description: Server-side internal storage name/key of the target object.
        schema: { type: string }
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              file:
                type: string
                format: binary
                description: The file bytes.
    responses:
      "200":
        description: Envelope-only result.
        content:
          application/json:
            schema: { $ref: "../components/schemas/common.yaml#/BaseVO" }
      "500":
        description: Multipart failure (errorCode FILE_UPLOAD_FAILED).

terminalUploadApply:
  post:
    tags: [File - Upload/Share/OSS]
    summary: Terminal (device) upload apply
    operationId: terminalUploadApply
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../components/schemas/files-upload-share-oss.yaml#/TerminalFileUploadApplyDTO" }
    responses:
      "200":
        description: Signed upload target.
        content:
          application/json:
            schema: { $ref: "../components/schemas/files-core.yaml#/FileUploadApplyLocalVO" }

terminalUploadFinish:
