# File & Sync (core / NAS / dropbox) paths. Derived from specs/files-core.md.

addFolderFileDeprecated:
  post:
    tags: [File - Core]
    summary: "[Deprecated] Create folder/file (desktop app only)"
    operationId: addFolderFileDeprecated
    deprecated: true
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../components/schemas/files-core.yaml#/FolderFileAddDTO" }
    responses:
      "200":
        description: Created folder/file metadata.
        content:
          application/json:
            schema: { $ref: "../components/schemas/files-core.yaml#/FolderFileAddVO" }

syncStart:
  post:
    tags: [File - Core]
    summary: Begin sync session (NAS)
    operationId: syncStart
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../components/schemas/files-core.yaml#/SynchronousStartLocalDTO" }
    responses:
      "200":
        description: Sync strategy (synType incremental vs full re-seed).
        content:
          application/json:
            schema: { $ref: "../components/schemas/files-core.yaml#/SynchronousStartLocalVO" }

syncEnd:
  post:
    tags: [File - Core]
    summary: End sync session (NAS)
    operationId: syncEnd
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../components/schemas/files-core.yaml#/SynchronousEndLocalDTO" }
    responses:
      "200":
        description: Session closed.
        content:
          application/json:
            schema: { $ref: "../components/schemas/files-core.yaml#/SynchronousEndLocalVO" }

createFolderV2:
  post:
    tags: [File - Core]
    summary: Create folder (NAS)
    operationId: createFolderV2
    description: "@ResubmitCheck on (path, equipmentNo) when path != null → 409 on duplicate."
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../components/schemas/files-core.yaml#/CreateFolderLocalDTO" }
    responses:
      "200":
        description: Created folder metadata.
        content:
          application/json:
            schema: { $ref: "../components/schemas/files-core.yaml#/CreateFolderLocalVO" }

listFolder:
  post:
    tags: [File - Core]
    summary: List folder by path (dropbox)
    operationId: listFolder
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../components/schemas/files-core.yaml#/ListFolderV2DTO" }
    responses:
      "200":
        description: Folder contents.
        content:
          application/json:
            schema: { $ref: "../components/schemas/files-core.yaml#/ListFolderLocalVO" }

listFolderV3:
