            schema: { $ref: "../components/schemas/equipment-base-system.yaml#/DictionaryByNameVO" }

# ------------------------------------------------------- Reference
queryRefDeprecated:
  post:
    tags: [Reference]
    summary: "[Deprecated] Fuzzy paged reference query"
    operationId: queryRefDeprecated
    deprecated: true
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../components/schemas/equipment-base-system.yaml#/ReferenceVaguaDTO" }
    responses:
      "200":
        description: Paged reference rows.
        content:
          application/json:
            schema: { $ref: "../components/schemas/equipment-base-system.yaml#/ReferenceCommonListVO" }

queryRefById:
  get:
    tags: [Reference]
    summary: "[Deprecated] Get reference by id"
    operationId: queryRefById
    deprecated: true
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
    responses:
      "200":
        description: Reference record (plain POJO).
        content:
          application/json:
            schema: { $ref: "../components/schemas/equipment-base-system.yaml#/ReferenceVO" }

queryReferenceByParam:
  post:
    tags: [Reference]
    summary: Query reference by business code + serial
    operationId: queryReferenceByParam
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../components/schemas/equipment-base-system.yaml#/ReferenceQueryDTO" }
    responses:
      "200":
        description: Reference collection.
        content:
          application/json:
            schema: { $ref: "../components/schemas/equipment-base-system.yaml#/ReferenceListVO" }

getReference:
  post:
    tags: [Reference]
    summary: Fetch public system parameters + login random nonce
    operationId: getReference
    security: []
    responses:
      "200":
        description: Parameter set + login random nonce.
        content:
          application/json:
            schema: { $ref: "../components/schemas/equipment-base-system.yaml#/ReferenceRespVO" }

# ------------------------------------------------------- System log
logLevel:
  get:
    tags: [System Log]
    summary: Query current logback log-level config
    operationId: getLogLevel
    responses:
      "200":
        description: Logger → level map.
        content:
          application/json:
            schema: { $ref: "../components/schemas/equipment-base-system.yaml#/LogLevelVO" }
  put:
    tags: [System Log]
    summary: Dynamically change a logger's level (no restart)
    operationId: setLogLevel
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../components/schemas/equipment-base-system.yaml#/LogLevelUpdateDTO" }
    responses:
      "200":
        description: Change result (only ERROR/WARN/INFO accepted).
        content:
          application/json:
            schema: { $ref: "../components/schemas/common.yaml#/BaseVO" }
