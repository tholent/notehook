queryDictionaryByParam:
  post:
    tags: [Dictionary]
    summary: "[Deprecated] Query dictionary by business code + value"
    operationId: queryDictionaryByParam
    deprecated: true
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../components/schemas/equipment-base-system.yaml#/DictionaryQueryDTO" }
    responses:
      "200":
        description: Dictionary collection.
        content:
          application/json:
            schema: { $ref: "../components/schemas/equipment-base-system.yaml#/DictionaryListVO" }

queryDictionaryByName:
  get:
    tags: [Dictionary]
    summary: "[Deprecated] Query dictionary by business code"
    operationId: queryDictionaryByName
    deprecated: true
    parameters:
      - { name: name, in: path, required: true, schema: { type: string }, description: Business code. }
    responses:
      "200":
