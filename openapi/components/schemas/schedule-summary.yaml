# =========================================================== SUMMARY domain objects
SummaryDO:
  type: object
  description: Unified library+summary row (t_summary), distinguished by isSummaryGroup.
  properties:
    id: { type: integer, format: int64 }
    fileId: { type: integer, format: int64 }
    name: { type: string }
    userId: { type: integer, format: int64 }
    uniqueIdentifier: { type: string }
    parentUniqueIdentifier: { type: string }
    content: { type: string }
    sourcePath: { type: string }
    dataSource: { type: string }
    sourceType: { type: integer }
    isSummaryGroup: { type: string, description: "'Y' = library/group, else leaf summary." }
    description: { type: string }
    tags: { type: string, description: Comma-separated tag names (denormalized). }
    md5Hash: { type: string }
    metadata: { type: string, description: Metadata (JSON). }
    commentStr: { type: string }
    commentHandwriteName: { type: string }
    handwriteInnerName: { type: string }
    handwriteMD5: { type: string }
    creationTime: { type: integer, format: int64 }
    lastModifiedTime: { type: integer, format: int64 }
    isDeleted: { type: string, enum: ["Y", "N"] }
    createTime: { type: string, description: Server row-create time (Date). }
    updateTime: { type: string, description: Server row-update time (Date). }
    author: { type: string }

SummaryInfoVO:
  type: object
  description: Slim diff projection (list element in QuerySummaryMD5HashVO).
  properties:
    id: { type: integer, format: int64 }
    userId: { type: integer, format: int64 }
    md5Hash: { type: string }
    handwriteMd5: { type: string }
    commentHandwriteName: { type: string }
    lastModifiedTime: { type: integer, format: int64 }
    metadataMap:
      type: object
      additionalProperties: { type: string }
      description: Parsed metadata JSON.

SummaryTagDO:
  type: object
  properties:
    id: { type: integer, format: int64 }
    name: { type: string }
    userId: { type: integer, format: int64 }
    createdAt: { type: string, description: Creation time (Date). }

