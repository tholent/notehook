# Schedule & Summary schemas. Derived from specs/schedule-summary.md.
# The schedule model mirrors the Google Tasks API (nextSyncToken/nextPageToken/
# maxResults, needsAction/completed, RFC 5545 recurrence).

# Reusable six-view sort columns (present on tasks and recurrence occurrences).
ScheduleSortColumns:
  type: object
  properties:
    sort: { type: integer, description: Position among incomplete tasks in a custom group / inbox. }
    sortCompleted: { type: integer, description: Position among completed tasks in a custom group / inbox. }
    planerSort: { type: integer, description: Position among incomplete tasks in the Planner view. }
    allSort: { type: integer, description: Position among incomplete tasks in the All view. }
    allSortCompleted: { type: integer, description: Position among completed tasks in the All view. }
    sortTime: { type: integer, format: int64, description: Timestamp of last inbox reorder. }
    planerSortTime: { type: integer, format: int64, description: Timestamp of last Planner reorder. }
    allSortTime: { type: integer, format: int64, description: Timestamp of last All-view reorder. }

# =========================================================== SCHEDULE DTOs
AddScheduleTaskGroupDTO:
  type: object
  required: [title]
  description: "@ResubmitCheck keyed on taskListId/title/createTime/lastModified when title != null."
  properties:
    taskListId: { type: string, description: Task-list id (client-supplied UUID). }
    title: { type: string, description: Task-list name. "@NotBlank". }
    lastModified: { type: integer, format: int64 }
    createTime: { type: integer, format: int64 }

UpdateScheduleTaskGroupDTO:
  type: object
  required: [taskListId, title]
  properties:
    taskListId: { type: string, description: Task-list id. "@NotBlank". }
    title: { type: string, description: New name. "@NotBlank". }
    lastModified: { type: integer, format: int64 }

ClearScheduleTaskGroupDTO:
  type: object
  required: [taskListId, lastModified]
  properties:
    taskListId: { type: string, description: Task-list id to clear. "@NotBlank". }
    lastModified: { type: integer, format: int64, description: Last-modified timestamp (ms). "@NotNull". }

ScheduleTaskGroupDTO:
  type: object
  properties:
    maxResults: { type: string, description: Max task-lists per page (default 20). }
    pageToken: { type: string, description: Page cursor. }

AddScheduleTaskDTO:
  allOf:
    - type: object
      required: [title]
      description: "@ResubmitCheck keyed on taskId/taskListId/recurrenceId/title/detail/lastModified when title != null."
      properties:
        taskId: { type: string }
        taskListId: { type: string }
        recurrenceId: { type: string, description: Follow/parent-task id linking this to a recurrence series. }
        title: { type: string, description: Task name. "@NotBlank". }
        detail: { type: string }
        lastModified: { type: integer, format: int64 }
        recurrence: { type: string, description: Recurrence rule (RFC 5545 RRULE). }
        isReminderOn: { type: string, description: Whether a reminder is enabled (default false). }
        status: { type: string, enum: [needsAction, completed] }
        importance: { type: string }
        dueTime: { type: integer, format: int64, description: Due time (UTC ms). }
        completedTime: { type: integer, format: int64, description: Completion time (UTC ms). }
        links: { type: string }
        isDeleted: { type: string, description: Soft-delete flag (default false). }
    - $ref: "#/ScheduleSortColumns"

UpdateScheduleTaskDTO:
  allOf:
    - type: object
      required: [taskId, title, lastModified]
      properties:
        taskId: { type: string, description: Task id. "@NotNull". }
        taskListId: { type: string }
        recurrenceId: { type: string }
        title: { type: string, description: Task name. "@NotBlank". }
        detail: { type: string }
        lastModified: { type: integer, format: int64, description: Last-modified timestamp. "@NotNull". }
        recurrence: { type: string }
        isReminderOn: { type: string }
        status: { type: string, enum: [needsAction, completed] }
        importance: { type: string }
        dueTime: { type: integer, format: int64 }
        completedTime: { type: integer, format: int64 }
        links: { type: string }
        isDeleted: { type: string }
    - $ref: "#/ScheduleSortColumns"

UpdateScheduleTaskListDTO:
  type: object
  properties:
    taskListId: { type: string, description: Parent task-list id (context for the batch). }
    updateScheduleTaskList:
      type: array
      items: { $ref: "#/UpdateScheduleTaskDTO" }

ScheduleTaskDTO:
  type: object
  properties:
    maxResults: { type: string, description: Max tasks per page (default 20). }
    nextPageTokens: { type: string, description: Page cursor. }
    nextSyncToken: { type: integer, format: int64, description: "Timestamp of the client's last sync; valid 5 days (older → 403/E0330)." }

ScheduleSortDTO:
  type: object
  properties:
    taskListId: { type: string }
    title: { type: string, description: Task-list name (denormalized copy). }
    lastModify: { type: integer, format: int64 }
    content: { type: string, description: Serialized sort order payload. }

GetScheduleSortDTO:
  type: object
  properties:
    nextIndexNumber: { type: integer, description: Cursor; null means first query. }

# =========================================================== SCHEDULE domain objects
ScheduleTaskGroupDO:
  type: object
  properties:
    taskListId: { type: string }
    userId: { type: integer, format: int64 }
    title: { type: string }
    lastModified: { type: integer, format: int64 }
    isDeleted: { type: string }
    createTime: { type: integer, format: int64 }

ScheduleRecurTaskDO:
  allOf:
    - type: object
      properties:
        taskId: { type: string, description: Parent root-task id. }
        recurrenceId: { type: string, description: Occurrence id (query key). }
        taskListId: { type: string }
        userId: { type: integer, format: int64 }
        lastModified: { type: integer, format: int64 }
        dueTime: { type: integer, format: int64 }
        completedTime: { type: integer, format: int64 }
        status: { type: string, enum: [needsAction, completed] }
        isDeleted: { type: string }
    - $ref: "#/ScheduleSortColumns"

ScheduleTaskInfo:
  allOf:
    - type: object
      properties:
        taskId: { type: string }
        taskListId: { type: string }
        title: { type: string }
        detail: { type: string }
        lastModified: { type: integer, format: int64 }
        recurrence: { type: string }
        isReminderOn: { type: string }
        status: { type: string, enum: [needsAction, completed] }
        importance: { type: string }
        dueTime: { type: integer, format: int64 }
        completedTime: { type: integer, format: int64 }
        links: { type: string }
        isDeleted: { type: string }
        scheduleRecurTask:
          type: array
          items: { $ref: "#/ScheduleRecurTaskDO" }
    - $ref: "#/ScheduleSortColumns"

# =========================================================== SCHEDULE VOs
AddScheduleTaskGroupVO:
  allOf:
    - $ref: "common.yaml#/BaseVO"
    - type: object
      properties:
        taskListId: { type: string, description: Id of the created task list. }

GetScheduleTaskGroupVO:
  allOf:
    - $ref: "common.yaml#/BaseVO"
    - type: object
      properties:
        taskListId: { type: string }
        userId: { type: integer, format: int64 }
        title: { type: string }
        lastModified: { type: integer, format: int64 }
        isDeleted: { type: string }
        createTime: { type: integer, format: int64 }

ScheduleTaskGroupVO:
  allOf:
    - $ref: "common.yaml#/BaseVO"
    - type: object
      properties:
        pageToken: { type: string, description: Cursor for the next page. }
        scheduleTaskGroup:
          type: array
          items: { $ref: "#/ScheduleTaskGroupDO" }

AddScheduleTaskVO:
  allOf:
    - $ref: "common.yaml#/BaseVO"
    - type: object
      properties:
        taskId: { type: string, description: Id of the created task. }

UpdateScheduleTaskVO:
  allOf:
    - $ref: "common.yaml#/BaseVO"
    - type: object
      properties:
        taskId: { type: string, description: Id of the updated task. }

ScheduleTaskVO:
  allOf:
    - $ref: "common.yaml#/BaseVO"
    - type: object
      properties:
        taskId: { type: integer, format: int64, description: Task id (Long here; String in DTOs). }
        taskListId: { type: integer, format: int64 }
        title: { type: string }
        detail: { type: string }
        lastModified: { type: integer, format: int64 }
        recurrence: { type: string }
        isReminderOn: { type: string }
        status: { type: string, enum: [needsAction, completed] }
        importance: { type: string }
        dueTime: { type: integer, format: int64 }
        completedTime: { type: integer, format: int64 }
        links: { type: string }
        isDeleted: { type: string }
        scheduleRecurTask:
          type: array
          items: { $ref: "#/ScheduleRecurTaskDO" }
    - $ref: "#/ScheduleSortColumns"

ScheduleTaskAllVO:
  allOf:
    - $ref: "common.yaml#/BaseVO"
    - type: object
      properties:
        nextPageToken: { type: string }
        nextSyncToken: { type: integer, format: int64, description: New sync token returned on the last page. }
        scheduleTask:
          type: array
          items: { $ref: "#/ScheduleTaskInfo" }

GetScheduleSortVO:
  allOf:
    - $ref: "common.yaml#/BaseVO"
    - type: object
      properties:
        taskListId: { type: string }
        title: { type: string }
        lastModify: { type: integer, format: int64 }
        content: { type: string }
        nextIndexNumber: { type: integer, description: Next cursor; null means no more data. }

