UpdateSummaryDTO:
  type: object
  required: [id]
  properties:
    id: { type: integer, format: int64, description: Summary id. "@NotNull". }
    parentUniqueIdentifier: { type: string }
    content: { type: string }
    sourcePath: { type: string }
    dataSource: { type: string }
    sourceType: { type: integer }
    tags: { type: string, description: "Tags, comma-separated." }
    md5Hash: { type: string }
    metadata: { type: string, description: Metadata (JSON). }
    commentStr: { type: string }
    commentHandwriteName: { type: string }
    handwriteInnerName: { type: string }
    handwriteMD5: { type: string }
    lastModifiedTime: { type: integer, format: int64 }
    author: { type: string }

DeleteSummaryDTO:
  type: object
