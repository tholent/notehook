[project]
name = "notehook-protocol"
version = "0.1.0"
description = "Shared Supernote API DTO/VO models and crypto helpers"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/notehook_protocol"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=notehook_protocol --cov-report=term-missing"

[tool.coverage.run]
source = ["src/notehook_protocol"]

[tool.coverage.report]
fail_under = 90
