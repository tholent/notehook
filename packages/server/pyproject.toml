[project]
name = "noted-server"
version = "0.1.0"
description = "Self-hosted Supernote sync server"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "pydantic>=2.10",
    "pydantic-settings>=2.7",
    "python-multipart>=0.0.20",
    "sqlmodel>=0.0.22",
    "noted-protocol",
    "uvicorn>=0.34",
]

[project.scripts]
noted-server = "noted_server.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/noted_server"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=noted_server --cov-report=term-missing"

[tool.coverage.run]
source = ["src/noted_server"]

[tool.coverage.report]
fail_under = 85
