[project]
name = "notehook-cli"
version = "0.1.0"
description = "CLI tool that keeps a local directory in sync with a Supernote sync server"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.28",
    "pydantic>=2.10",
    "rich>=13.9",
    "sqlmodel>=0.0.22",
    "notehook-protocol",
    "typer>=0.15",
    "watchfiles>=1.0",
]

[project.scripts]
notehook = "notehook_cli.cli:app"

[dependency-groups]
dev = [
    "notehook-server",
]

[tool.uv.sources]
notehook-server = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/notehook_cli"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=notehook_cli --cov-report=term-missing"
markers = [
    "uv: exercises the real `uv run` invocation path (skipped when `uv` is not on PATH)",
]

[tool.coverage.run]
source = ["src/notehook_cli"]

[tool.coverage.report]
fail_under = 80
